---
# Deploys the AI stack: Open WebUI, Qdrant, and Pipelines. The inference
# platform (Ollama + LiteLLM) is deployed separately by platform/platform.yml;
# this stack reaches it over the shared network. Idempotent.
#
#   ansible-playbook platform/platform.yml --ask-vault-pass   # first
#   ansible-playbook playbooks/deploy.yml  --ask-vault-pass   # then this
- name: Deploy Ask My Docs AI stack
  hosts: llm_servers
  become: true

  vars_files:
    - ../vars/main.yml
    - ../vars/secrets.yml

  roles:
    # Installs Docker + Compose so the playbook works on a fresh box; a no-op
    # where Docker already exists.
    - role: geerlingguy.docker
      vars:
        docker_install_compose_plugin: true

  tasks:
    - name: Ensure the shared Docker network exists
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present

    - name: Create project directory
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        mode: "0755"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ project_root }}/docker-compose.yml"
        mode: "0600"  # contains the Open WebUI session + Langfuse + LiteLLM keys
      no_log: true  # keep secret values out of console/log output

    - name: Start the stack
      community.docker.docker_compose_v2:
        project_src: "{{ project_root }}"
        state: present
        remove_orphans: true

    - name: Wait for the stack to become healthy
      ansible.builtin.uri:
        url: "{{ item.url }}"
      register: health
      until: health.status == 200
      retries: 24
      delay: 5
      loop: "{{ stack_health_endpoints }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Show endpoints
      ansible.builtin.debug:
        msg:
          - "Open WebUI: http://{{ ansible_host }}:{{ openwebui_port }} (first signup becomes admin)"
          - "Models and inference are served by the platform via LiteLLM."
