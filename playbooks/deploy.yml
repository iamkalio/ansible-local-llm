---
# Deploys the full stack: Docker → compose up → pull models.
# Idempotent — safe to re-run any time.
#
#   ansible-playbook playbooks/deploy.yml --ask-vault-pass
- name: Deploy Ask My Docs stack
  hosts: llm_servers
  become: true

  vars_files:
    - ../vars/main.yml
    - ../vars/secrets.yml

  roles:
    # Installs Docker + Compose so the playbook works on a fresh box; a no-op
    # where Docker already exists. We don't set docker_daemon_options, so the
    # role leaves an existing daemon.json (and the running daemon) untouched.
    - role: geerlingguy.docker
      vars:
        docker_install_compose_plugin: true

  tasks:
    # ── The stack: one compose file, reconciled by compose itself ──────
    - name: Create project directory
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        mode: "0755"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ project_root }}/docker-compose.yml"
        mode: "0600"  # contains the Open WebUI session + Langfuse secrets
      # Suppress diff/output: the rendered file holds secrets and must not be
      # printed to the console or any log (e.g. under --diff or in CI).
      no_log: true

    - name: Start the stack
      community.docker.docker_compose_v2:
        project_src: "{{ project_root }}"
        state: present
        remove_orphans: true

    - name: Wait for every service to become healthy
      ansible.builtin.uri:
        url: "{{ item.url }}"
      register: health
      until: health.status == 200
      retries: 24
      delay: 5
      loop: "{{ stack_health_endpoints }}"
      loop_control:
        label: "{{ item.name }}"

    # ── Models: pull only what isn't on disk yet ────────────────────────
    - name: List models already on disk
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ ollama_port }}/api/tags"
      register: ollama_tags

    - name: Pull missing models (first run downloads the model, be patient)
      ansible.builtin.command:
        argv: [docker, exec, ollama, ollama, pull, "{{ item }}"]
      vars:
        models_on_disk: "{{ ollama_tags.json.models | default([]) | map(attribute='name') | list }}"
      when: item not in models_on_disk and (item ~ ':latest') not in models_on_disk
      loop: "{{ ollama_models }}"
      changed_when: true
      async: 1800
      poll: 15

    - name: Show endpoints
      ansible.builtin.debug:
        msg: "Open WebUI is up at http://{{ ansible_host }}:{{ openwebui_port }} — first signup becomes admin."
