[defaults]
inventory = inventory.yml
retry_files_enabled = False
host_key_checking = True
interpreter_python = auto_silent
# Give a slow-to-prompt sudo (e.g. reverse-DNS delay on a fresh box) room to
# respond before the privilege-escalation prompt times out.
timeout = 30
# Uncomment once you create .vault-password (gitignored) to skip --ask-vault-pass
# vault_password_file = .vault-password

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[privilege_escalation]
become_method = sudo
