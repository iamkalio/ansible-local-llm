---
# All tunables for the stack live here. Secrets live in vars/secrets.yml (vaulted).

project_root: /opt/ask-my-docs              # AI stack
platform_root: /opt/ask-my-docs-platform    # inference platform
docker_network: llm_net

# ── Images (pinned: upgrades are a deliberate change in git) ────────────
ollama_image: ollama/ollama:0.9.0
qdrant_image: qdrant/qdrant:v1.14.1
openwebui_image: ghcr.io/open-webui/open-webui:v0.6.13
# Pipelines runs the Langfuse filter that traces chat. Upstream publishes no
# semver tags, so this tracks the maintained branch — pin to a digest if you
# want byte-for-byte reproducibility.
pipelines_image: ghcr.io/open-webui/pipelines:main
# LiteLLM gateway and its backing database. litellm tracks the stable tag;
# pin to a version (e.g. ghcr.io/berriai/litellm:v1.xx-stable) for repeatability.
litellm_image: ghcr.io/berriai/litellm:main-stable
litellm_db_image: postgres:16-alpine

# ── Ports ───────────────────────────────────────────────────────────────
# Open WebUI (chat) and LiteLLM (the model gateway/API) are exposed; Ollama
# and Qdrant bind to localhost and are only reached over the compose network.
openwebui_port: 3000
litellm_port: 4000
ollama_port: 11434
qdrant_port: 6333

# ── Models ──────────────────────────────────────────────────────────────
chat_model: llama3.2:3b-instruct-q4_K_M
embedding_model: nomic-embed-text
ollama_models:
  - "{{ chat_model }}"
  - "{{ embedding_model }}"

# ── Platform: LiteLLM gateway ───────────────────────────────────────────

litellm_chat_alias: local-chat
litellm_embed_alias: local-embed
litellm_ui_username: admin

# ── Langfuse (cloud) ────────────────────────────────────────────────────
langfuse_host: https://cloud.langfuse.com
# Chat tracing: the Pipelines container auto-loads this filter on startup and
# logs every chat completion (prompt, response, latency, retrieved docs) to
# Langfuse using the keys in secrets.yml.
langfuse_filter_url: https://raw.githubusercontent.com/open-webui/pipelines/main/examples/filters/langfuse_filter_pipeline.py
# Default auth key Open WebUI uses to talk to the Pipelines server. Not a
# secret in any meaningful sense — it only guards an internal-network port.
pipelines_api_key: "0p3n-w3bu!"

# ── Ingestion ───────────────────────────────────────────────────────────
# Local directory (on YOUR laptop) of .md/.txt files to embed into Qdrant.
# Override per run: -e ingest_docs_dir=~/notes
ingest_docs_dir: "{{ playbook_dir }}/../docs-sample"
qdrant_collection: ask_my_docs
chunk_size: 800
chunk_overlap: 120

# ── Derived (no need to touch) ──────────────────────────────────────────
# Health gates, split by deploy unit.
platform_health_endpoints:
  - { name: ollama, url: "http://127.0.0.1:{{ ollama_port }}/api/version" }
  - { name: litellm, url: "http://127.0.0.1:{{ litellm_port }}/health/liveliness" }
stack_health_endpoints:
  - { name: qdrant, url: "http://127.0.0.1:{{ qdrant_port }}/readyz" }
  - { name: openwebui, url: "http://127.0.0.1:{{ openwebui_port }}/health" }
